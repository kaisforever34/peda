[build]
  command = "npx prisma generate && npx prisma db push --accept-data-loss && npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NEXT_USE_NETLIFY_EDGE = "false"
  DATABASE_URL = "file:./prisma/dev.db"

[context.production]
  environment = { NEXT_USE_NETLIFY_EDGE = "false" }

[context.deploy-preview]
  environment = { NEXT_USE_NETLIFY_EDGE = "false" }
